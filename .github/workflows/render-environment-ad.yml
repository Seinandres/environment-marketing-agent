# .github/workflows/render-environment-ad.yml
# Render exclusivo para Environment Marketing Agent
# Corre cuando el webhook dispara: event_type = render-environment-ad

name: Render Environment Ad

on:
  repository_dispatch:
    types: [render-environment-ad]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: remotion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion/package-lock.json

      - name: Install Chrome dependencies
        working-directory: .
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2 fonts-dejavu-core

      - name: Install Python + Edge-TTS
        working-directory: .
        run: pip install edge-tts --quiet

      - name: Install dependencies
        run: npm install

      - name: Render video
        env:
          VIDEO_PROPS: ${{ toJson(github.event.client_payload.videoProps) }}
          POST_IDS: ${{ toJson(github.event.client_payload.postIds) }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WEBHOOK_URL: ${{ secrets.APP_WEBHOOK_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RUN_ID: ${{ github.run_id }}
        run: node scripts/render-environment-ad.mjs

      - name: Upload MP4 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: environment-ad-${{ github.run_id }}
          path: remotion/out/*.mp4
          retention-days: 7

      - name: Notify failure
        if: failure()
        env:
          POST_IDS: ${{ toJson(github.event.client_payload.postIds) }}
          WEBHOOK_URL: ${{ secrets.APP_WEBHOOK_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RUN_ID: ${{ github.run_id }}
        working-directory: .
        run: |
          curl -s -X POST "$WEBHOOK_URL/api/webhooks/render-complete" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"postIds\": $POST_IDS, \"success\": false, \"error\": \"Render job failed\", \"runId\": \"$RUN_ID\"}"
